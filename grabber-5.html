<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Grabber(ithel) – YouTube to MP3</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red:#e8192c; --red-h:#c7121f; --red-g:rgba(232,25,44,0.32);
      --blue:#1557ff; --blue-h:#0d45d4; --blue-g:rgba(21,87,255,0.22);
      --bg:#f0f4ff; --white:#fff; --text:#111827; --muted:#6b7280; --border:#dde3f0;
      --green:#16a34a; --green-g:rgba(22,163,74,0.32);
    }
    body {
      font-family:'Nunito',sans-serif; background:var(--bg);
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      padding:24px 16px; position:relative; overflow-x:hidden;
    }
    .blob { position:fixed; border-radius:50%; filter:blur(100px); pointer-events:none; z-index:0; }
    .b1 { width:500px;height:500px; background:radial-gradient(circle,rgba(21,87,255,0.13) 0%,transparent 70%); top:-170px;left:-150px; }
    .b2 { width:420px;height:420px; background:radial-gradient(circle,rgba(232,25,44,0.11) 0%,transparent 70%); bottom:-130px;right:-120px; }
    .wrap { position:relative;z-index:1;width:100%;max-width:560px;display:flex;flex-direction:column;align-items:center;gap:26px; }

    header { text-align:center; }
    .logo { font-family:'Bebas Neue',sans-serif; font-size:clamp(52px,13vw,88px); letter-spacing:.07em; color:var(--text); line-height:1; }
    .logo span { color:var(--red); text-shadow:0 4px 20px var(--red-g); }
    .sub { font-size:13px;font-weight:700;color:var(--muted);margin-top:5px;letter-spacing:.04em; }

    .card { width:100%;background:var(--white);border-radius:22px;padding:32px 28px 40px;box-shadow:0 2px 0 var(--border),0 16px 50px rgba(0,0,0,0.08);display:flex;align-items:center;justify-content:center;min-height:160px; }
    .step { width:100%;display:flex;flex-direction:column;align-items:center;gap:16px; }
    .step.hidden { display:none; }

    .irow { display:flex;align-items:center;width:100%;border:2px solid var(--border);border-radius:50px;padding:5px 5px 5px 14px;background:#f8faff;transition:border-color .2s,box-shadow .2s;gap:8px; }
    .irow:focus-within { border-color:var(--blue);box-shadow:0 0 0 4px rgba(21,87,255,0.1);background:#fff; }
    .yt-ic { width:21px;height:21px;flex-shrink:0; }
    #urlInput { flex:1;border:none;outline:none;background:transparent;font-family:'Nunito',sans-serif;font-size:14.5px;color:var(--text);padding:9px 0; }
    #urlInput::placeholder { color:#bbc2d4; }
    .btn-cv { background:var(--blue);color:#fff;border:none;border-radius:50px;padding:10px 22px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;white-space:nowrap;box-shadow:0 4px 14px var(--blue-g);transition:background .2s,transform .15s; }
    .btn-cv:hover { background:var(--blue-h);transform:translateY(-1px); }
    .hint { font-size:12px;color:var(--muted); }

    .ring { width:50px;height:50px;border:4px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite; }
    .rtxt { font-size:13px;font-weight:700;color:var(--muted);text-align:center;line-height:1.6; }

    .rbox { display:flex;align-items:center;gap:14px;width:100%;background:#f8faff;border:1.5px solid var(--border);border-radius:13px;padding:13px 15px; }
    .thumb { position:relative;flex-shrink:0; }
    .thumb img { width:108px;height:66px;object-fit:cover;border-radius:8px;display:block; }
    .mp3tag { position:absolute;bottom:4px;right:4px;background:var(--red);color:#fff;font-size:9px;font-weight:800;padding:2px 5px;border-radius:4px;letter-spacing:.05em; }
    .rinfo { flex:1;min-width:0; }
    .rtitle { font-size:13.5px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px; }
    .rmeta { font-size:11.5px;color:var(--muted); }

    /* ── THE ROUND BUTTON ── */
    .dl-btn {
      width:114px;height:114px;border-radius:50%;border:none;
      background:var(--red);color:#fff;cursor:pointer;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
      box-shadow:0 0 0 9px rgba(232,25,44,0.1),0 8px 28px var(--red-g);
      transition:background .35s,box-shadow .35s,transform .15s;
      position:relative;
    }
    .dl-btn:hover:not([disabled]) { transform:scale(1.06); }
    .dl-btn:active:not([disabled]) { transform:scale(0.96); }
    .dl-btn[disabled] { cursor:not-allowed;opacity:.7; }

    .dl-btn.going {
      background:var(--green) !important;
      box-shadow:0 0 0 9px rgba(22,163,74,0.12),0 8px 28px var(--green-g) !important;
      animation:pulse 1.4s ease-in-out infinite;
    }
    .dl-btn.done {
      background:var(--green) !important;
      box-shadow:0 0 0 9px rgba(22,163,74,0.12),0 8px 28px var(--green-g) !important;
      animation:none !important;
    }

    .ico { width:26px;height:26px;transition:opacity .15s; }
    .spinner { position:absolute;width:42px;height:42px;animation:spin 1s linear infinite;opacity:0;transition:opacity .15s;pointer-events:none; }
    .dl-btn.going .ico   { opacity:0; }
    .dl-btn.going .spinner { opacity:1; }
    .dl-lbl { font-size:10.5px;font-weight:800;text-align:center;line-height:1.35;letter-spacing:.04em;text-transform:uppercase;transition:opacity .15s; }

    .btn-back { background:none;border:none;color:var(--blue);font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;padding:4px 10px;border-radius:6px;transition:background .15s; }
    .btn-back:hover { background:rgba(21,87,255,0.07); }

    .eico { width:52px;height:52px;border-radius:50%;background:#fee2e2;color:var(--red);font-size:22px;font-weight:800;display:flex;align-items:center;justify-content:center; }
    .emsg { font-size:13.5px;font-weight:600;color:var(--muted);text-align:center;max-width:320px;line-height:1.6; }

    footer p { font-size:11.5px;color:#a8b0c8;text-align:center;font-weight:600;letter-spacing:.03em; }

    @keyframes spin  { to { transform:rotate(360deg); } }
    @keyframes pulse { 0%,100%{box-shadow:0 0 0 9px rgba(22,163,74,0.12),0 8px 28px var(--green-g)} 50%{box-shadow:0 0 0 20px rgba(22,163,74,0.04),0 12px 36px var(--green-g)} }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }

    @media(max-width:460px){
      .card{padding:22px 16px 30px;}
      .rbox{flex-direction:column;text-align:center;}
      .thumb img{width:100%;height:auto;}
      .rinfo{width:100%;}
      .rtitle{white-space:normal;}
    }
  </style>
</head>
<body>

<div class="blob b1"></div>
<div class="blob b2"></div>

<div class="wrap">
  <header>
    <div class="logo"><span>G</span>RABBER</div>
    <p class="sub">Convert &amp; Download YouTube Videos as MP3</p>
  </header>

  <section class="card">

    <!-- Step 1: Input -->
    <div class="step" id="s1">
      <div class="irow">
        <svg class="yt-ic" viewBox="0 0 24 24">
          <path d="M23 7s-.3-2-1.2-2.8C20.7 3 19.4 3 18.8 2.9 16.2 2.8 12 2.8 12 2.8s-4.2 0-6.8.1C4.6 3 3.3 3 2.2 4.2 1.3 5 1 7 1 7S.7 9.3.7 11.6v2.1c0 2.3.3 4.6.3 4.6s.3 2 1.2 2.8c1.1 1.2 2.6 1.1 3.3 1.2C7.6 22.4 12 22.4 12 22.4s4.2 0 6.8-.2c.6-.1 1.9-.1 3-1.3.9-.8 1.2-2.8 1.2-2.8s.3-2.3.3-4.6v-2.1C23.3 9.3 23 7 23 7zm-13.5 7.5v-8l8 4-8 4z" fill="#ff0000"/>
        </svg>
        <input type="url" id="urlInput" placeholder="Paste YouTube link here…" autocomplete="off" spellcheck="false"/>
        <button class="btn-cv" id="cvBtn">Convert</button>
      </div>
      <p class="hint">Supports youtube.com &amp; youtu.be links</p>
    </div>

    <!-- Step 2: Loading -->
    <div class="step hidden" id="s2">
      <div class="ring"></div>
      <p class="rtxt" id="loadMsg">Getting MP3 link…</p>
    </div>

    <!-- Step 3: Result -->
    <div class="step hidden" id="s3">
      <div class="rbox">
        <div class="thumb">
          <img id="tImg" src="" alt=""/>
          <span class="mp3tag">MP3</span>
        </div>
        <div class="rinfo">
          <p class="rtitle" id="rTitle">–</p>
          <p class="rmeta">128 kbps · MP3</p>
        </div>
      </div>

      <!-- Round button: RED → GREEN pulsing while downloading → GREEN tick when done -->
      <button class="dl-btn" id="dlBtn">
        <svg class="ico" id="ico" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <svg class="spinner" viewBox="0 0 44 44">
          <circle cx="22" cy="22" r="18" fill="none" stroke="white" stroke-width="3.5" stroke-dasharray="80" stroke-dashoffset="60" stroke-linecap="round"/>
        </svg>
        <span class="dl-lbl" id="dlLbl">Download<br/>MP3</span>
      </button>

      <button class="btn-back" id="backBtn">← Convert another</button>
    </div>

    <!-- Step 4: Error -->
    <div class="step hidden" id="s4">
      <div class="eico">✕</div>
      <p class="emsg" id="eMsg">Something went wrong.</p>
      <button class="btn-back" id="errBack">← Try again</button>
    </div>

  </section>

  <footer><p>Free to use · No sign-up · No redirects</p></footer>
</div>

<script>
// ─────────────────────────────────────────────────────────────
// Your RapidAPI key — works across ALL RapidAPI services
// ─────────────────────────────────────────────────────────────
const RKEY = '0a7fbf5f25msh8e4416481902fd0p194669jsn1a3c1fb44e48';

// ─── DOM ─────────────────────────────────────────────────────
const $    = id => document.getElementById(id);
const show = id => { ['s1','s2','s3','s4'].forEach(x=>$(x).classList.add('hidden')); $(id).classList.remove('hidden'); };

let mp3Link  = '';
let mp3Title = 'audio';

// ─── Get video ID from any YouTube URL ───────────────────────
function getVid(url) {
  try {
    const u = new URL(url.trim());
    if (u.hostname === 'youtu.be') return u.pathname.slice(1).split('?')[0];
    if (u.pathname.startsWith('/shorts/')) return u.pathname.split('/')[2];
    return u.searchParams.get('v') || null;
  } catch { return null; }
}

// ─── Try APIs in order until one works ───────────────────────
async function tryAPIs(vid, fullUrl) {

  // ── API 1: youtube-mp36 (ytjar) ────────────────────────────
  try {
    $('loadMsg').textContent = 'Converting… (method 1/2)';
    let d = await (await fetch(`https://youtube-mp36.p.rapidapi.com/dl?id=${vid}`, {
      headers: { 'x-rapidapi-key': RKEY, 'x-rapidapi-host': 'youtube-mp36.p.rapidapi.com' }
    })).json();

    // Poll if still processing
    for (let i = 0; i < 8 && d?.status === 'processing'; i++) {
      await sleep(2500);
      d = await (await fetch(`https://youtube-mp36.p.rapidapi.com/dl?id=${vid}`, {
        headers: { 'x-rapidapi-key': RKEY, 'x-rapidapi-host': 'youtube-mp36.p.rapidapi.com' }
      })).json();
    }
    if (d?.status === 'ok' && d?.link?.startsWith('http')) return { link: d.link, title: d.title || '' };
  } catch {}

  // ── API 2: youtube-to-mp315 (marcocollatina) ───────────────
  try {
    $('loadMsg').textContent = 'Converting… (method 2/2)';
    const d = await (await fetch(`https://youtube-to-mp315.p.rapidapi.com/dl?id=${vid}`, {
      headers: { 'x-rapidapi-key': RKEY, 'x-rapidapi-host': 'youtube-to-mp315.p.rapidapi.com' }
    })).json();
    const link = d?.link || d?.url || d?.download_url;
    if (link && link.startsWith('http')) return { link, title: d?.title || '' };
  } catch {}

  return null; // all failed
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function clean(s)  { return (s||'audio').replace(/[<>:"/\\|?*\u0000-\u001F]/g,'').trim()||'audio'; }
function shake(el) { el.style.animation='none'; void el.offsetWidth; el.style.animation='shake .35s ease'; el.addEventListener('animationend',()=>el.style.animation='',{once:true}); }

// ─── CONVERT ──────────────────────────────────────────────────
async function doConvert() {
  const raw = $('urlInput').value.trim();
  if (!raw) { shake($('urlInput')); return; }
  const vid = getVid(raw);
  if (!vid) { fail("Doesn't look like a YouTube URL. Please check and try again."); return; }

  show('s2');
  $('loadMsg').textContent = 'Getting video info…';

  // Thumbnail + title via oEmbed (always works, no CORS)
  let title = 'YouTube Video';
  let thumb = `https://i.ytimg.com/vi/${vid}/hqdefault.jpg`;
  try {
    const oe = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${vid}&format=json`);
    if (oe.ok) { const d = await oe.json(); title = d.title||title; thumb = d.thumbnail_url||thumb; }
  } catch {}

  const result = await tryAPIs(vid, `https://www.youtube.com/watch?v=${vid}`);

  if (!result) {
    fail('Conversion failed. Please check your internet connection and try again. If the issue persists, the video may be unavailable or region-locked.');
    return;
  }

  mp3Link  = result.link;
  mp3Title = result.title || title;

  $('tImg').src         = thumb;
  $('rTitle').textContent = result.title || title;
  show('s3');
}

// ─── DOWNLOAD (silent blob download, no new tabs) ─────────────
async function doDownload() {
  if (!mp3Link) return;
  const btn = $('dlBtn');
  const lbl = $('dlLbl');

  // Instantly go green + pulse
  btn.setAttribute('disabled','');
  btn.classList.add('going');
  lbl.innerHTML = 'Downloading…';

  try {
    const res  = await fetch(mp3Link);
    if (!res.ok) throw new Error('link_expired');
    const blob = await res.blob();

    // Silent save — no new tab
    const url = URL.createObjectURL(blob);
    const a   = Object.assign(document.createElement('a'), {
      href: url, download: clean(mp3Title)+'.mp3'
    });
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 10000);

    // Show tick
    btn.classList.remove('going');
    btn.classList.add('done');
    $('ico').innerHTML = `<polyline points="20 6 9 17 4 12" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>`;
    lbl.innerHTML = 'Done!';

    setTimeout(() => {
      btn.classList.remove('done');
      btn.removeAttribute('disabled');
      $('ico').innerHTML = `
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" fill="none"/>
        <polyline points="7 10 12 15 17 10" fill="none"/>
        <line x1="12" y1="15" x2="12" y2="3"/>`;
      lbl.innerHTML = 'Download<br/>MP3';
    }, 5000);

  } catch (e) {
    btn.classList.remove('going');
    btn.removeAttribute('disabled');
    lbl.innerHTML = 'Download<br/>MP3';
    if (e.message === 'link_expired') {
      fail('Download link expired. Please hit "Convert another" and try again.');
    } else {
      // Last resort fallback: open link directly
      window.open(mp3Link, '_blank');
      btn.classList.add('done');
      lbl.innerHTML = 'Opening…';
      setTimeout(() => { btn.classList.remove('done'); lbl.innerHTML = 'Download<br/>MP3'; }, 4000);
    }
  }
}

function fail(msg) { $('eMsg').textContent = msg; show('s4'); }
function reset()   { mp3Link=''; mp3Title='audio'; $('urlInput').value=''; show('s1'); $('urlInput').focus(); }

$('cvBtn').addEventListener('click', doConvert);
$('urlInput').addEventListener('keydown', e => { if (e.key==='Enter') doConvert(); });
$('dlBtn').addEventListener('click', doDownload);
$('backBtn').addEventListener('click', reset);
$('errBack').addEventListener('click', reset);
</script>

</body>
</html>
